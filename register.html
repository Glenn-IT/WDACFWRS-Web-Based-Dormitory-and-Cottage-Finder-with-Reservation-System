<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register | CSU-Piat Dormitory &amp; Cottage Finder</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
</head>
<body class="auth-page">

  <div class="auth-card" style="max-width: 720px;">
    <div class="auth-form-panel">
      <div class="text-center mb-4">
        <i class="fa-solid fa-building-columns fa-2x text-primary mb-2"></i>
        <h4 class="fw-bold mb-0">Create Your Student Account</h4>
        <p class="text-muted">Register to start reserving dormitories and cottages.</p>
      </div>

      <form id="register-form" novalidate>
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">First Name</label>
            <input type="text" class="form-control" id="reg-first-name" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">Last Name</label>
            <input type="text" class="form-control" id="reg-last-name" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">Email Address</label>
            <input type="email" class="form-control" id="reg-email" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">Phone Number</label>
            <input type="text" class="form-control" id="reg-phone" placeholder="09XXXXXXXXX">
          </div>
          <div class="col-md-6">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" id="reg-password" required minlength="6">
          </div>
          <div class="col-md-6">
            <label class="form-label">Confirm Password</label>
            <input type="password" class="form-control" id="reg-confirm-password" required minlength="6">
          </div>
          <div class="col-md-6">
            <label class="form-label">Course</label>
            <select class="form-select" id="reg-course" required>
              <option value="">Select course</option>
              <option>BS Information Technology</option>
              <option>BS Agriculture</option>
              <option>BS Education</option>
              <option>BS Criminology</option>
              <option>BS Business Administration</option>
              <option>BS Hospitality Management</option>
              <option>BS Fisheries</option>
            </select>
          </div>
          <div class="col-md-3">
            <label class="form-label">Year Level</label>
            <select class="form-select" id="reg-year-level" required>
              <option value="">Select</option>
              <option>1st Year</option>
              <option>2nd Year</option>
              <option>3rd Year</option>
              <option>4th Year</option>
            </select>
          </div>
          <div class="col-md-3">
            <label class="form-label">Semester</label>
            <select class="form-select" id="reg-semester" required>
              <option value="">Select</option>
              <option>1st Semester</option>
              <option>2nd Semester</option>
            </select>
          </div>
          <div class="col-12">
            <hr>
            <p class="fw-semibold mb-2"><i class="fa-solid fa-shield-halved me-1 text-primary"></i> Security Question (for password recovery)</p>
          </div>
          <div class="col-md-7">
            <label class="form-label">Security Question</label>
            <select class="form-select" id="reg-security-question" required>
              <option value="">Select a security question</option>
              <option>What is your mother's maiden name?</option>
              <option>What was the name of your first pet?</option>
              <option>What is your birth city?</option>
              <option>What is your favorite teacher's name?</option>
            </select>
          </div>
          <div class="col-md-5">
            <label class="form-label">Your Answer</label>
            <input type="text" class="form-control" id="reg-security-answer" required>
          </div>
        </div>

        <div class="alert alert-danger d-none mt-3" id="register-error"></div>

        <div class="form-check mt-3">
          <input class="form-check-input" type="checkbox" id="reg-terms" required>
          <label class="form-check-label small" for="reg-terms">I agree to the Terms of Service and Privacy Policy</label>
        </div>

        <button type="submit" class="btn btn-primary w-100 py-2 mt-3">Create Account</button>
        <p class="text-center mt-3 mb-0">Already have an account? <a href="index.html">Sign in</a></p>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/auth.js"></script>
  <script>
    document.getElementById("register-form").addEventListener("submit", function (e) {
      e.preventDefault();
      const errorEl = document.getElementById("register-error");
      errorEl.classList.add("d-none");

      const password = document.getElementById("reg-password").value;
      const confirm = document.getElementById("reg-confirm-password").value;
      if (password !== confirm) {
        errorEl.textContent = "Passwords do not match.";
        errorEl.classList.remove("d-none");
        return;
      }

      const data = {
        firstName: document.getElementById("reg-first-name").value.trim(),
        lastName: document.getElementById("reg-last-name").value.trim(),
        email: document.getElementById("reg-email").value.trim(),
        phone: document.getElementById("reg-phone").value.trim(),
        password,
        course: document.getElementById("reg-course").value,
        yearLevel: document.getElementById("reg-year-level").value,
        semester: document.getElementById("reg-semester").value,
        securityQuestion: document.getElementById("reg-security-question").value,
        securityAnswer: document.getElementById("reg-security-answer").value.trim(),
      };

      withLoading(async () => {
        const result = await Auth.register(data);
        if (!result.ok) {
          errorEl.textContent = result.message;
          errorEl.classList.remove("d-none");
          return;
        }
        showToast("Account created successfully! Please sign in.", "success");
        setTimeout(() => (window.location.href = "index.html"), 900);
      });
    });
  </script>
</body>
</html>
