<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login | CSU-Piat Dormitory &amp; Cottage Finder</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
</head>
<body class="auth-page">

  <div class="auth-card">
    <div class="row g-0">
      <div class="col-md-5 brand-panel">
        <i class="fa-solid fa-building-columns"></i>
        <h3 class="fw-bold">CSU-Piat</h3>
        <h5>Dormitory &amp; Cottage Finder</h5>
        <p class="mt-3 mb-0 opacity-75">Find, reserve, and manage your stay — dormitories and cottages made simple for CSU-Piat students.</p>
      </div>
      <div class="col-md-7 auth-form-panel">
        <div class="d-flex role-toggle gap-2 mb-4">
          <button type="button" class="btn btn-primary active" id="role-student-btn"><i class="fa-solid fa-user-graduate me-1"></i> Student</button>
          <button type="button" class="btn btn-outline-primary" id="role-admin-btn"><i class="fa-solid fa-user-shield me-1"></i> Administrator</button>
        </div>

        <h4 class="fw-bold mb-1">Welcome back</h4>
        <p class="text-muted mb-4">Sign in to continue.</p>

        <form id="login-form" novalidate>
          <div class="mb-3">
            <label class="form-label">Email Address</label>
            <input type="email" class="form-control" id="login-email" required placeholder="you@csupiat.edu.ph">
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <div class="input-group">
              <input type="password" class="form-control" id="login-password" required placeholder="Enter your password">
              <button class="btn btn-outline-secondary" type="button" id="toggle-password"><i class="fa-solid fa-eye"></i></button>
            </div>
          </div>
          <div class="d-flex justify-content-between align-items-center mb-3">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="remember-me">
              <label class="form-check-label small" for="remember-me">Remember me</label>
            </div>
            <a href="forgot-password.html" class="small">Forgot Password?</a>
          </div>
          <div class="alert alert-danger d-none" id="login-error"></div>
          <button type="submit" class="btn btn-primary w-100 py-2">Sign In</button>
        </form>

        <p class="text-center mt-4 mb-0" id="register-hint">Don't have an account? <a href="register.html">Register here</a></p>
        <div class="text-center mt-2">
          <small class="text-muted">Default admin: admin@csupiat.edu.ph / Admin@123</small>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/auth.js"></script>
  <script>
    let currentRole = "student";
    const studentBtn = document.getElementById("role-student-btn");
    const adminBtn = document.getElementById("role-admin-btn");
    const registerHint = document.getElementById("register-hint");

    function setRole(role) {
      currentRole = role;
      studentBtn.classList.toggle("btn-primary", role === "student");
      studentBtn.classList.toggle("btn-outline-primary", role !== "student");
      adminBtn.classList.toggle("btn-primary", role === "admin");
      adminBtn.classList.toggle("btn-outline-primary", role !== "admin");
      registerHint.style.display = role === "admin" ? "none" : "";
    }
    studentBtn.addEventListener("click", () => setRole("student"));
    adminBtn.addEventListener("click", () => setRole("admin"));

    document.getElementById("toggle-password").addEventListener("click", function () {
      const input = document.getElementById("login-password");
      const isPw = input.type === "password";
      input.type = isPw ? "text" : "password";
      this.querySelector("i").className = isPw ? "fa-solid fa-eye-slash" : "fa-solid fa-eye";
    });

    // Redirect if already logged in
    (async function () {
      const session = await Auth.getSession();
      if (session) {
        window.location.href = session.role === "admin" ? "admin/dashboard.html" : "user/dashboard.html";
      }
    })();

    document.getElementById("login-form").addEventListener("submit", function (e) {
      e.preventDefault();
      const email = document.getElementById("login-email").value.trim();
      const password = document.getElementById("login-password").value;
      const errorEl = document.getElementById("login-error");
      errorEl.classList.add("d-none");

      withLoading(async () => {
        const result = currentRole === "admin" ? await Auth.loginAdmin(email, password) : await Auth.loginStudent(email, password);
        if (!result.ok) {
          errorEl.textContent = result.message;
          errorEl.classList.remove("d-none");
          return;
        }
        showToast("Login successful! Redirecting...", "success");
        setTimeout(() => {
          window.location.href = currentRole === "admin" ? "admin/dashboard.html" : "user/dashboard.html";
        }, 600);
      });
    });
  </script>
</body>
</html>
