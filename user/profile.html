<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Profile | CSU-Piat DCF</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link href="../assets/css/style.css" rel="stylesheet">
</head>
<body data-role="student" data-page="profile">
  <aside class="app-sidebar" id="app-sidebar"></aside>
  <header class="app-topbar" id="app-topbar"></header>

  <main class="app-main">
    <h4 class="fw-bold mb-4">My Profile</h4>

    <div class="row g-4">
      <div class="col-lg-4">
        <div class="section-card text-center">
          <img src="https://placehold.co/160x160" class="rounded-circle mb-3" id="profile-picture" style="width:140px;height:140px;object-fit:cover;">
          <div>
            <label class="btn btn-outline-primary btn-sm">
              <i class="fa-solid fa-camera me-1"></i>Upload Photo
              <input type="file" accept="image/*" id="profile-picture-input" hidden>
            </label>
          </div>
          <h5 class="fw-bold mt-3 mb-0" id="profile-full-name">Student Name</h5>
          <p class="text-muted mb-0" id="profile-email">email@csupiat.edu.ph</p>
          <p class="text-muted small" id="profile-id">STU-0000</p>
          <hr>
          <button class="btn btn-primary w-100 mb-2" data-bs-toggle="modal" data-bs-target="#change-password-modal"><i class="fa-solid fa-lock me-1"></i>Change Password</button>
        </div>
      </div>

      <div class="col-lg-8">
        <div class="section-card">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h6 class="fw-bold mb-0">Personal Information</h6>
            <button class="btn btn-sm btn-outline-primary" id="edit-profile-btn"><i class="fa-solid fa-pen me-1"></i>Edit Profile</button>
          </div>
          <form id="profile-form">
            <fieldset id="profile-fieldset" disabled>
              <div class="row g-3">
                <div class="col-md-6"><label class="form-label small">First Name</label><input class="form-control" id="pf-first-name"></div>
                <div class="col-md-6"><label class="form-label small">Last Name</label><input class="form-control" id="pf-last-name"></div>
                <div class="col-md-6"><label class="form-label small">Course</label><input class="form-control" id="pf-course"></div>
                <div class="col-md-3"><label class="form-label small">Year Level</label><input class="form-control" id="pf-year-level"></div>
                <div class="col-md-3"><label class="form-label small">Semester</label><input class="form-control" id="pf-semester"></div>
                <div class="col-md-6"><label class="form-label small">Nationality</label><input class="form-control" id="pf-nationality"></div>
                <div class="col-md-6"><label class="form-label small">Birthday</label><input type="date" class="form-control" id="pf-birthday"></div>
                <div class="col-md-6"><label class="form-label small">Phone Number</label><input class="form-control" id="pf-phone"></div>
                <div class="col-md-12"><label class="form-label small">Address</label><input class="form-control" id="pf-address"></div>
              </div>
            </fieldset>
            <div class="mt-3 d-none" id="profile-save-actions">
              <button type="submit" class="btn btn-primary">Save Changes</button>
              <button type="button" class="btn btn-outline-secondary" id="cancel-edit-btn">Cancel</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </main>

  <!-- Change Password Modal -->
  <div class="modal fade" id="change-password-modal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <form id="change-password-form">
          <div class="modal-header">
            <h5 class="modal-title">Change Password</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <div class="mb-3"><label class="form-label">Current Password</label><input type="password" class="form-control" id="cp-current" required></div>
            <div class="mb-3"><label class="form-label">New Password</label><input type="password" class="form-control" id="cp-new" required minlength="6"></div>
            <div class="mb-3"><label class="form-label">Confirm New Password</label><input type="password" class="form-control" id="cp-confirm" required minlength="6"></div>
            <div class="alert alert-danger d-none" id="cp-error"></div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-primary">Update Password</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/ui.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/layout.js"></script>
  <script src="../assets/js/user-profile.js"></script>
</body>
</html>
