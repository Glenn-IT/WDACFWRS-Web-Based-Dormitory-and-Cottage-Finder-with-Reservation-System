<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Forgot Password | CSU-Piat Dormitory &amp; Cottage Finder</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
</head>
<body class="auth-page">

  <div class="auth-card" style="max-width: 520px;">
    <div class="auth-form-panel">
      <div class="text-center mb-4">
        <i class="fa-solid fa-key fa-2x text-primary mb-2"></i>
        <h4 class="fw-bold mb-0">Forgot Password</h4>
        <p class="text-muted">Recover access using your security question.</p>
      </div>

      <ul class="wizard-steps" style="max-width: 380px; margin: 0 auto 2rem;">
        <li class="active" id="fp-step-indicator-1"><div class="step-circle">1</div>Find Account</li>
        <li id="fp-step-indicator-2"><div class="step-circle">2</div>Verify</li>
        <li id="fp-step-indicator-3"><div class="step-circle">3</div>Reset</li>
      </ul>

      <!-- Step 1: Find account -->
      <div id="fp-step-1">
        <div class="d-flex role-toggle gap-2 mb-3">
          <button type="button" class="btn btn-primary active" id="fp-role-student-btn">Student</button>
          <button type="button" class="btn btn-outline-primary" id="fp-role-admin-btn">Administrator</button>
        </div>
        <div class="mb-3">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-control" id="fp-email" required placeholder="you@csupiat.edu.ph">
        </div>
        <div class="alert alert-danger d-none" id="fp-error-1"></div>
        <button class="btn btn-primary w-100 py-2" id="fp-find-btn">Find Account</button>
      </div>

      <!-- Step 2: Security question -->
      <div id="fp-step-2" class="d-none">
        <div class="mb-3">
          <label class="form-label fw-semibold" id="fp-question-label">Security Question</label>
          <input type="text" class="form-control" id="fp-answer" required placeholder="Your answer">
        </div>
        <div class="alert alert-danger d-none" id="fp-error-2"></div>
        <button class="btn btn-primary w-100 py-2" id="fp-verify-btn">Verify Answer</button>
      </div>

      <!-- Step 3: Reset password -->
      <div id="fp-step-3" class="d-none">
        <div class="mb-3">
          <label class="form-label">New Password</label>
          <input type="password" class="form-control" id="fp-new-password" required minlength="6">
        </div>
        <div class="mb-3">
          <label class="form-label">Confirm New Password</label>
          <input type="password" class="form-control" id="fp-confirm-password" required minlength="6">
        </div>
        <div class="alert alert-danger d-none" id="fp-error-3"></div>
        <button class="btn btn-primary w-100 py-2" id="fp-reset-btn">Reset Password</button>
      </div>

      <!-- Step 4: Success -->
      <div id="fp-step-4" class="d-none text-center">
        <i class="fa-solid fa-circle-check fa-4x text-success mb-3"></i>
        <h5 class="fw-bold">Password Reset Successful</h5>
        <p class="text-muted">You may now sign in with your new password.</p>
        <a href="index.html" class="btn btn-primary w-100 py-2">Back to Sign In</a>
      </div>

      <p class="text-center mt-4 mb-0"><a href="index.html"><i class="fa-solid fa-arrow-left me-1"></i>Back to Sign In</a></p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/auth.js"></script>
  <script>
    let fpRole = "student";
    let fpAccount = null;

    document.getElementById("fp-role-student-btn").addEventListener("click", function () {
      fpRole = "student";
      this.classList.add("btn-primary", "active");
      this.classList.remove("btn-outline-primary");
      const other = document.getElementById("fp-role-admin-btn");
      other.classList.add("btn-outline-primary");
      other.classList.remove("btn-primary");
    });
    document.getElementById("fp-role-admin-btn").addEventListener("click", function () {
      fpRole = "admin";
      this.classList.add("btn-primary", "active");
      this.classList.remove("btn-outline-primary");
      const other = document.getElementById("fp-role-student-btn");
      other.classList.add("btn-outline-primary");
      other.classList.remove("btn-primary");
    });

    function goToStep(n) {
      [1, 2, 3, 4].forEach((i) => {
        document.getElementById(`fp-step-${i}`).classList.toggle("d-none", i !== n);
      });
      [1, 2, 3].forEach((i) => {
        const el = document.getElementById(`fp-step-indicator-${i}`);
        if (!el) return;
        el.classList.toggle("active", i === n);
        el.classList.toggle("done", i < n);
      });
    }

    document.getElementById("fp-find-btn").addEventListener("click", () => {
      const email = document.getElementById("fp-email").value.trim();
      const errorEl = document.getElementById("fp-error-1");
      errorEl.classList.add("d-none");

      withLoading(async () => {
        const result = await Auth.findSecurityQuestion(email, fpRole);
        if (!result.ok) {
          errorEl.textContent = result.message;
          errorEl.classList.remove("d-none");
          return;
        }
        fpAccount = { email };
        document.getElementById("fp-question-label").textContent = result.question;
        goToStep(2);
      });
    });

    document.getElementById("fp-verify-btn").addEventListener("click", () => {
      const answer = document.getElementById("fp-answer").value.trim();
      const errorEl = document.getElementById("fp-error-2");
      errorEl.classList.add("d-none");

      withLoading(async () => {
        const result = await Auth.verifySecurityAnswer(fpAccount.email, fpRole, answer);
        if (!result.ok) {
          errorEl.textContent = result.message;
          errorEl.classList.remove("d-none");
          return;
        }
        goToStep(3);
      });
    });

    document.getElementById("fp-reset-btn").addEventListener("click", () => {
      const newPw = document.getElementById("fp-new-password").value;
      const confirmPw = document.getElementById("fp-confirm-password").value;
      const errorEl = document.getElementById("fp-error-3");
      errorEl.classList.add("d-none");

      if (newPw !== confirmPw) {
        errorEl.textContent = "Passwords do not match.";
        errorEl.classList.remove("d-none");
        return;
      }

      withLoading(async () => {
        const result = await Auth.resetPassword(fpAccount.email, fpRole, document.getElementById("fp-answer").value.trim(), newPw);
        if (!result.ok) {
          errorEl.textContent = result.message;
          errorEl.classList.remove("d-none");
          return;
        }
        goToStep(4);
      });
    });
  </script>
</body>
</html>
