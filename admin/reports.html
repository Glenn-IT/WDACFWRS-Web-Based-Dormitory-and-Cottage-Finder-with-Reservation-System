<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1366">
  <title>Reports | CSU-Piat Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link href="../assets/css/style.css" rel="stylesheet">
</head>
<body data-role="admin" data-page="reports">
  <aside class="app-sidebar" id="app-sidebar"></aside>
  <header class="app-topbar" id="app-topbar"></header>

  <main class="app-main">
    <h4 class="fw-bold mb-4">Reports</h4>

    <div class="section-card mb-4">
      <div class="row g-3 align-items-end">
        <div class="col-md-3">
          <label class="form-label small">Report Type</label>
          <select class="form-select" id="report-type">
            <option value="reservations">Reservations</option>
            <option value="dorm-occupancy">Dorm Occupancy</option>
            <option value="cottage-occupancy">Cottage Occupancy</option>
            <option value="revenue">Revenue Summary</option>
            <option value="registrations">User Registrations</option>
          </select>
        </div>
        <div class="col-md-2">
          <label class="form-label small">From Date</label>
          <input type="date" class="form-control" id="report-date-from">
        </div>
        <div class="col-md-2">
          <label class="form-label small">To Date</label>
          <input type="date" class="form-control" id="report-date-to">
        </div>
        <div class="col-md-2">
          <label class="form-label small">Reservation Type</label>
          <select class="form-select" id="report-res-type"><option value="">All</option><option>Dormitory</option><option>Cottage</option></select>
        </div>
        <div class="col-md-2">
          <label class="form-label small">Status</label>
          <select class="form-select" id="report-status"><option value="">All</option><option>Pending</option><option>Approved</option><option>Declined</option><option>Cancelled</option></select>
        </div>
        <div class="col-md-1">
          <button class="btn btn-primary w-100" id="preview-report-btn"><i class="fa-solid fa-eye"></i></button>
        </div>
      </div>
    </div>

    <div class="section-card">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h6 class="fw-bold mb-0" id="report-title">Reservations Report</h6>
        <div class="d-flex gap-2">
          <button class="btn btn-outline-secondary btn-sm" id="print-report-btn"><i class="fa-solid fa-print me-1"></i>Print</button>
          <button class="btn btn-outline-primary btn-sm" id="export-report-btn"><i class="fa-solid fa-file-pdf me-1"></i>Export PDF</button>
        </div>
      </div>
      <div id="report-summary" class="row g-3 mb-3"></div>
      <div class="table-responsive" id="report-table-container"></div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/ui.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/layout.js"></script>
  <script src="../assets/js/admin-reports.js"></script>
</body>
</html>
