<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1366">
  <title>Manage Cottages | CSU-Piat Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link href="../assets/css/style.css" rel="stylesheet">
</head>
<body data-role="admin" data-page="cottages">
  <aside class="app-sidebar" id="app-sidebar"></aside>
  <header class="app-topbar" id="app-topbar"></header>

  <main class="app-main">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h4 class="fw-bold mb-0">Manage Cottages</h4>
      <button class="btn btn-primary" id="add-cottage-btn"><i class="fa-solid fa-plus me-1"></i>Add Cottage</button>
    </div>

    <div class="section-card">
      <div class="table-responsive">
        <table class="table table-hover align-middle table-responsive-card">
          <thead>
            <tr>
              <th>Image</th><th>Owner</th><th>Name</th><th>Rooms</th><th>Price</th><th>Availability</th><th class="text-end">Actions</th>
            </tr>
          </thead>
          <tbody id="cottages-table-body"></tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- Add/Edit Modal -->
  <div class="modal fade" id="cottage-modal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content">
        <form id="cottage-form">
          <div class="modal-header">
            <h5 class="modal-title" id="cottage-modal-title">Add Cottage</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="cottage-id">
            <div class="row g-3">
              <div class="col-md-6"><label class="form-label">Cottage Name</label><input class="form-control" id="cottage-name" required></div>
              <div class="col-md-6"><label class="form-label">Owner</label><input class="form-control" id="cottage-owner" required></div>
              <div class="col-md-4"><label class="form-label">Number of Rooms</label><input type="number" min="1" class="form-control" id="cottage-rooms" required></div>
              <div class="col-md-4"><label class="form-label">Price (per day)</label><input type="number" min="0" class="form-control" id="cottage-price" required></div>
              <div class="col-md-4"><label class="form-label">Availability</label>
                <select class="form-select" id="cottage-availability" required><option>Available</option><option>Booked</option></select>
              </div>
              <div class="col-12"><label class="form-label">Description</label><textarea class="form-control" id="cottage-description" rows="3" required></textarea></div>
              <div class="col-12">
                <label class="form-label">Cottage Image</label>
                <input type="file" accept="image/*" class="form-control" id="cottage-image-input">
                <img id="cottage-image-preview" class="mt-2 rounded" style="max-height:140px;display:none;">
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-primary">Save Cottage</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- View Modal -->
  <div class="modal fade" id="cottage-view-modal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Cottage Details</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="cottage-view-body"></div>
        <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Close</button></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/ui.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/layout.js"></script>
  <script src="../assets/js/admin-cottages.js"></script>
</body>
</html>
