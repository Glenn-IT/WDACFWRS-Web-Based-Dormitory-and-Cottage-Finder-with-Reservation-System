<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1366">
  <title>Manage Reservations | CSU-Piat Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link href="../assets/css/style.css" rel="stylesheet">
</head>
<body data-role="admin" data-page="reservations">
  <aside class="app-sidebar" id="app-sidebar"></aside>
  <header class="app-topbar" id="app-topbar"></header>

  <main class="app-main">
    <h4 class="fw-bold mb-4">Manage Reservations</h4>

    <div class="section-card mb-3">
      <div class="row g-3">
        <div class="col-md-3">
          <label class="form-label small">Type</label>
          <select class="form-select" id="filter-type"><option value="">All</option><option>Dormitory</option><option>Cottage</option></select>
        </div>
        <div class="col-md-3">
          <label class="form-label small">Approval Status</label>
          <select class="form-select" id="filter-approval"><option value="">All</option><option>Pending</option><option>Approved</option><option>Declined</option><option>Cancelled</option></select>
        </div>
        <div class="col-md-3">
          <label class="form-label small">Payment Status</label>
          <select class="form-select" id="filter-payment"><option value="">All</option><option>Paid</option><option>Pending</option></select>
        </div>
        <div class="col-md-3">
          <label class="form-label small">Search Student</label>
          <input type="text" class="form-control" id="filter-search" placeholder="Search name...">
        </div>
      </div>
    </div>

    <div class="section-card">
      <div class="table-responsive">
        <table class="table table-hover align-middle table-responsive-card">
          <thead>
            <tr>
              <th>Reservation #</th><th>Student</th><th>Room/Cottage</th><th>Type</th><th>Date</th><th>Payment</th><th>Approval</th><th class="text-end">Actions</th>
            </tr>
          </thead>
          <tbody id="reservations-table-body"></tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- View Modal -->
  <div class="modal fade" id="reservation-view-modal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content" id="reservation-print-area">
        <div class="modal-header">
          <h5 class="modal-title">Reservation Details</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="reservation-view-body"></div>
        <div class="modal-footer">
          <button class="btn btn-outline-secondary" id="print-reservation-btn"><i class="fa-solid fa-print me-1"></i>Print</button>
          <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/ui.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/layout.js"></script>
  <script src="../assets/js/admin-reservations.js"></script>
</body>
</html>
