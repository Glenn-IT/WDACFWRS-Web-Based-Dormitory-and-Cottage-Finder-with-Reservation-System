<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1366">
  <title>Settings | CSU-Piat Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link href="../assets/css/style.css" rel="stylesheet">
</head>
<body data-role="admin" data-page="settings">
  <aside class="app-sidebar" id="app-sidebar"></aside>
  <header class="app-topbar" id="app-topbar"></header>

  <main class="app-main">
    <h4 class="fw-bold mb-4">Settings</h4>

    <ul class="nav nav-tabs mb-4" id="settings-tabs">
      <li class="nav-item"><button class="nav-link active" data-tab="profile">System Profile</button></li>
      <li class="nav-item"><button class="nav-link" data-tab="security">Security Questions</button></li>
      <li class="nav-item"><button class="nav-link" data-tab="password">Change Password</button></li>
    </ul>

    <div class="section-card" style="max-width:640px;">
      <div id="tab-profile">
        <h6 class="fw-bold mb-3">System Profile</h6>
        <form id="profile-settings-form">
          <div class="row g-3">
            <div class="col-12"><label class="form-label">Full Name</label><input class="form-control" id="admin-name" required></div>
            <div class="col-12"><label class="form-label">Email Address</label><input type="email" class="form-control" id="admin-email" required></div>
            <div class="col-12"><label class="form-label">Role</label><input class="form-control" id="admin-role" disabled></div>
          </div>
          <button type="submit" class="btn btn-primary mt-3">Save Changes</button>
        </form>
      </div>

      <div id="tab-security" class="d-none">
        <h6 class="fw-bold mb-3">Security Question</h6>
        <form id="security-settings-form">
          <div class="mb-3">
            <label class="form-label">Security Question</label>
            <select class="form-select" id="admin-security-question">
              <option>What is your mother's maiden name?</option>
              <option>What was the name of your first pet?</option>
              <option>What is your birth city?</option>
            </select>
          </div>
          <div class="mb-3"><label class="form-label">Answer</label><input class="form-control" id="admin-security-answer" placeholder="Enter a new answer to update it" required></div>
          <button type="submit" class="btn btn-primary">Save Security Question</button>
        </form>
      </div>

      <div id="tab-password" class="d-none">
        <h6 class="fw-bold mb-3">Change Password</h6>
        <form id="password-settings-form">
          <div class="mb-3"><label class="form-label">Current Password</label><input type="password" class="form-control" id="s-current-password" required></div>
          <div class="mb-3"><label class="form-label">New Password</label><input type="password" class="form-control" id="s-new-password" required minlength="6"></div>
          <div class="mb-3"><label class="form-label">Confirm New Password</label><input type="password" class="form-control" id="s-confirm-password" required minlength="6"></div>
          <div class="alert alert-danger d-none" id="s-password-error"></div>
          <button type="submit" class="btn btn-primary">Update Password</button>
        </form>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/ui.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/layout.js"></script>
  <script src="../assets/js/admin-settings.js"></script>
</body>
</html>
