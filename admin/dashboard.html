<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1366">
  <title>Dashboard | CSU-Piat Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link href="../assets/css/style.css" rel="stylesheet">
</head>
<body data-role="admin" data-page="dashboard">
  <aside class="app-sidebar" id="app-sidebar"></aside>
  <header class="app-topbar" id="app-topbar"></header>

  <main class="app-main">
    <h4 class="fw-bold mb-4">Admin Dashboard</h4>

    <div class="row g-3 mb-4">
      <div class="col-6 col-xl-3">
        <div class="stat-card">
          <div class="stat-icon" style="background:#1d4ed8;"><i class="fa-solid fa-users"></i></div>
          <div><div class="stat-value" id="stat-total-users">0</div><div class="stat-label">Total Users</div></div>
        </div>
      </div>
      <div class="col-6 col-xl-3">
        <div class="stat-card">
          <div class="stat-icon" style="background:#0284c7;"><i class="fa-solid fa-door-open"></i></div>
          <div><div class="stat-value" id="stat-total-dorms">0</div><div class="stat-label">Total Dormitories</div></div>
        </div>
      </div>
      <div class="col-6 col-xl-3">
        <div class="stat-card">
          <div class="stat-icon" style="background:#16a34a;"><i class="fa-solid fa-house-chimney"></i></div>
          <div><div class="stat-value" id="stat-total-cottages">0</div><div class="stat-label">Total Cottages</div></div>
        </div>
      </div>
      <div class="col-6 col-xl-3">
        <div class="stat-card">
          <div class="stat-icon" style="background:#d97706;"><i class="fa-solid fa-hourglass-half"></i></div>
          <div><div class="stat-value" id="stat-pending-reservations">0</div><div class="stat-label">Pending Reservations</div></div>
        </div>
      </div>
      <div class="col-6 col-xl-3">
        <div class="stat-card">
          <div class="stat-icon" style="background:#16a34a;"><i class="fa-solid fa-circle-check"></i></div>
          <div><div class="stat-value" id="stat-approved-reservations">0</div><div class="stat-label">Approved Reservations</div></div>
        </div>
      </div>
      <div class="col-6 col-xl-3">
        <div class="stat-card">
          <div class="stat-icon" style="background:#0ea5e9;"><i class="fa-solid fa-bed"></i></div>
          <div><div class="stat-value" id="stat-available-rooms">0</div><div class="stat-label">Available Rooms</div></div>
        </div>
      </div>
      <div class="col-6 col-xl-3">
        <div class="stat-card">
          <div class="stat-icon" style="background:#64748b;"><i class="fa-solid fa-bed-pulse"></i></div>
          <div><div class="stat-value" id="stat-occupied-rooms">0</div><div class="stat-label">Occupied Rooms</div></div>
        </div>
      </div>
      <div class="col-6 col-xl-3">
        <div class="stat-card">
          <div class="stat-icon" style="background:#7c3aed;"><i class="fa-solid fa-sack-dollar"></i></div>
          <div><div class="stat-value" id="stat-revenue">₱0</div><div class="stat-label">Total Revenue</div></div>
        </div>
      </div>
    </div>

    <div class="row g-4">
      <div class="col-lg-6">
        <div class="section-card">
          <h6 class="fw-bold mb-3">Reservation Statistics</h6>
          <canvas id="chart-reservation-stats" height="220"></canvas>
        </div>
      </div>
      <div class="col-lg-6">
        <div class="section-card">
          <h6 class="fw-bold mb-3">Monthly Reservations</h6>
          <canvas id="chart-monthly" height="220"></canvas>
        </div>
      </div>
      <div class="col-lg-6">
        <div class="section-card">
          <h6 class="fw-bold mb-3">Dormitory Occupancy</h6>
          <canvas id="chart-dorm-occupancy" height="220"></canvas>
        </div>
      </div>
      <div class="col-lg-6">
        <div class="section-card">
          <h6 class="fw-bold mb-3">Cottage Occupancy</h6>
          <canvas id="chart-cottage-occupancy" height="220"></canvas>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/ui.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/layout.js"></script>
  <script src="../assets/js/admin-dashboard.js"></script>
</body>
</html>
